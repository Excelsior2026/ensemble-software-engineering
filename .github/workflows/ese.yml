name: Ensemble Software Engineering (ESE)

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  ese_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ESE
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Create ESE config
        run: |
          cat > ese.config.yaml <<'YAML'
          version: 1
          mode: ensemble
          provider:
            name: openai
            model: gpt-5
            api_key_env: OPENAI_API_KEY
          roles:
            architect: {}
            implementer: {}
            adversarial_reviewer: {}
            security_auditor: {}
            test_generator: {}
            performance_analyst: {}
          constraints:
            disallow_same_model_pairs:
              - [architect, implementer]
              - [implementer, adversarial_reviewer]
              - [implementer, security_auditor]
          runtime:
            adapter: dry-run
          YAML

      - name: Validate config
        run: ese doctor --config ese.config.yaml

      - name: Run ESE pipeline
        run: ese run --config ese.config.yaml --artifacts-dir artifacts

      - name: Upload ESE artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ese-artifacts
          path: artifacts/
